name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Unit tests
        run: PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=src python -B -m unittest discover -s tests -v
      - name: Self-check
        run: PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=src python -B -m sqlite_privacy_boundary.selfcheck
      - name: Minimal example
        run: PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=src python -B examples/minimal.py
